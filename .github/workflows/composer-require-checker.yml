name: Composer require checker

on:
  pull_request:
    paths: &paths
      - 'src/**'
      - 'config/**'
      - '.github/workflows/composer-require-checker.yml'
      - 'composer.json'
  push:
    branches: ['master']
    paths: *paths

permissions:
  contents: read

jobs:
  composer-require-checker:
    uses: yiisoft/actions/.github/workflows/composer-require-checker.yml@master
    with:
      os: >-
        ['ubuntu-latest']
      php: >-
        ['8.1']
